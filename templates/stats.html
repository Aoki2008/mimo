<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MiMo Gateway — 公开统计</title>
<style>
  :root{
    --bg:#0a0e17;--card:#111827;--border:#1e293b;
    --text:#c8d6e5;--text2:#8899aa;--text3:#556677;
    --accent:#3b82f6;--accent2:#2563eb;
    --green:#22c55e;--red:#ef4444;--yellow:#f59e0b;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);
       font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Microsoft YaHei',sans-serif;
       min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:48px 16px}
  .wrap{width:100%;max-width:920px}
  header{margin-bottom:32px}
  h1{margin:0 0 6px;font-size:1.6rem;letter-spacing:0.4px}
  .sub{color:var(--text3);font-size:0.85rem}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;margin-bottom:24px}
  .card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:18px}
  .card .num{font-size:1.7rem;font-weight:700;color:#fff;letter-spacing:0.4px}
  .card .lbl{font-size:0.75rem;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
  .card .foot{font-size:0.72rem;color:var(--text3);margin-top:6px}
  .vps{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:18px}
  .vps h2{margin:0 0 12px;font-size:1rem;color:var(--text)}
  .vps-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px dashed var(--border);font-size:0.85rem}
  .vps-row:last-child{border-bottom:0}
  .vps-name{color:var(--text)}
  .vps-meta{color:var(--text3);font-size:0.75rem}
  .pill{display:inline-block;padding:2px 8px;border-radius:99px;font-size:0.72rem;font-weight:600}
  .pill.up{background:#052e16;color:var(--green)}
  .pill.down{background:#2d0a0a;color:var(--red)}
  .pill.unknown{background:#2d1f05;color:var(--yellow)}
  footer{color:var(--text3);font-size:0.75rem;margin-top:32px;text-align:center}
  a{color:var(--accent)}
  .err{color:var(--red);font-size:0.8rem;margin-top:8px}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>MiMo Gateway · 运行统计</h1>
    <div class="sub">公开数据 · 自 <span id="since">—</span> 起</div>
  </header>

  <div class="grid" id="stats-grid">
    <div class="card"><div class="lbl">累计请求</div><div class="num" id="total-requests">—</div></div>
    <div class="card"><div class="lbl">成功率</div><div class="num" id="success-rate">—</div><div class="foot" id="success-foot"></div></div>
    <div class="card"><div class="lbl">总 Token 数</div><div class="num" id="total-tokens">—</div><div class="foot" id="tokens-foot"></div></div>
    <div class="card"><div class="lbl">输入 Token</div><div class="num" id="prompt-tokens">—</div></div>
    <div class="card"><div class="lbl">输出 Token</div><div class="num" id="completion-tokens">—</div></div>
  </div>

  <section class="vps">
    <h2>节点状态</h2>
    <div id="vps-summary" class="sub"></div>
    <div id="vps-list">加载中…</div>
  </section>

  <footer>
    <span id="updated-at"></span> · <a href="/">前往管理面板</a>
  </footer>
</div>

<script>
const fmt = n => (n ?? 0).toLocaleString();
const ts2hms = ts => {
  if (!ts) return "—";
  const d = new Date(ts * 1000);
  return d.toLocaleString();
};
const stateClass = s => s === "up" ? "up" : s === "down" ? "down" : "unknown";
const stateText = s => s === "up" ? "在线" : s === "down" ? "离线" : "未知";

async function loadStats(){
  try{
    const r = await fetch('/api/public/stats').then(r => r.json());
    document.getElementById('total-requests').textContent = fmt(r.total_requests);
    document.getElementById('success-rate').textContent = (r.success_rate ?? 0) + '%';
    document.getElementById('success-foot').textContent =
      `${fmt(r.successful_requests)} 成功 / ${fmt(r.total_requests)} 总数`;
    document.getElementById('total-tokens').textContent = fmt(r.total_tokens);
    document.getElementById('tokens-foot').textContent =
      `输入 ${fmt(r.prompt_tokens)} · 输出 ${fmt(r.completion_tokens)}`;
    document.getElementById('prompt-tokens').textContent = fmt(r.prompt_tokens);
    document.getElementById('completion-tokens').textContent = fmt(r.completion_tokens);
    document.getElementById('since').textContent = r.since || '—';
  }catch(e){
    console.warn('stats fetch failed', e);
  }
}

async function loadVps(){
  const list = document.getElementById('vps-list');
  const summary = document.getElementById('vps-summary');
  try{
    const r = await fetch('/api/gateway/vps').then(r => r.json());
    const t = r.targets || [];
    if(t.length === 0){
      list.innerHTML = '<div class="vps-meta">暂无探针目标</div>';
      summary.textContent = '';
      return;
    }
    summary.textContent = `共 ${r.summary.total} 个 · 在线 ${r.summary.up} · 离线 ${r.summary.down}` +
      (r.summary.unknown ? ` · 未知 ${r.summary.unknown}` : '');
    list.innerHTML = t.map(x => `
      <div class="vps-row">
        <div>
          <div class="vps-name">${x.name}</div>
          <div class="vps-meta">${x.host}:${x.port}${x.last_check_ts ? ' · 最近检测 ' + ts2hms(x.last_check_ts) : ''}</div>
        </div>
        <div style="text-align:right">
          <div><span class="pill ${stateClass(x.state)}">${stateText(x.state)}</span></div>
          <div class="vps-meta">${x.state === 'up' ? x.latency_ms + ' ms' : (x.last_error || '')}</div>
        </div>
      </div>
    `).join('');
  }catch(e){
    list.innerHTML = '<div class="err">无法加载节点状态</div>';
    summary.textContent = '';
  }
}

function updatedNow(){
  document.getElementById('updated-at').textContent = '更新于 ' + new Date().toLocaleTimeString();
}

(async function init(){
  await Promise.all([loadStats(), loadVps()]);
  updatedNow();
  setInterval(async () => {
    await Promise.all([loadStats(), loadVps()]);
    updatedNow();
  }, 30000);
})();
</script>
</body>
</html>
