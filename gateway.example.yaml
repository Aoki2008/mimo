# MiMo Gateway — sample configuration
#
# Copy to gateway.yaml and adjust. Then run:
#   GATEWAY_CONFIG=./gateway.yaml uvicorn gateway.server:app --port 8088

gateway:
  host: 0.0.0.0
  port: 8088
  default_rate_limit_per_min: 60
  request_timeout_s: 600

storage:
  api_keys_db: ./data/api_keys.db
  decision_log: ./data/decisions.jsonl

probe:
  interval_s: 30
  timeout_s: 5
  failure_threshold: 3
  cooldown_s: 30

backends:
  # Each backend = one MiMo Studio account, exposed by the auto-deploy module.
  # base_url should point at the per-account upstream that mimics OpenAI Chat.
  - id: mimo-acct-example
    base_url: https://acct-example.aoki.tech
    model: MiMo-VL-7B-RL-2508
    api_key: sk-upstream-replace-me
    weight: 1
    account_id: acct-example
    aliases:
      - claude-3-5-sonnet
      - gpt-4
